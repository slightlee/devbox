<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <style>
    /* --- Layout --- */
    .crop-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: var(--space-lg);
      align-items: start;
    }
    @media (max-width: 860px) {
      .crop-layout {
        grid-template-columns: 1fr;
      }
    }

    /* --- Canvas area --- */
    .crop-canvas-area {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .crop-workspace {
      position: relative;
      display: inline-block;
      line-height: 0;
      background: var(--color-bg-elevated);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .crop-workspace canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }
    #cropOverlay {
      position: absolute;
      top: 0;
      left: 0;
      cursor: crosshair;
    }
    .img-info-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-lg);
      padding: var(--space-sm) var(--space-md);
      font-size: 0.8125rem;
      color: var(--color-text-secondary);
      font-family: var(--font-mono);
    }

    /* --- Side panel --- */
    .crop-side-panel {
      position: sticky;
      top: calc(var(--nav-height) + var(--space-xl));
    }
    .crop-side-panel .tool-panel {
      border-radius: var(--radius-lg);
    }
    .crop-side-panel .panel-body {
      padding: var(--space-md);
    }

    /* --- Form elements --- */
    .ratio-btns {
      display: flex;
      gap: 0;
      flex-wrap: wrap;
    }
    .ratio-btns .btn { border-radius: 0; min-width: 40px; font-size: 0.75rem; padding: 4px 8px; min-height: 28px; }
    .ratio-btns .btn:first-child { border-radius: var(--radius-md) 0 0 var(--radius-md); }
    .ratio-btns .btn:last-child { border-radius: 0 var(--radius-md) var(--radius-md) 0; }
    .ratio-btns .btn + .btn { margin-left: -1px; }
    .ratio-btns .btn.active {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
      z-index: 1;
    }
    .form-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }
    .form-row:last-child { margin-bottom: 0; }
    .form-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--color-text-muted);
      white-space: nowrap;
      min-width: 36px;
    }
    .input-sm {
      width: 64px;
      padding: 5px 6px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 0.75rem;
      font-family: var(--font-mono);
      text-align: center;
      outline: none;
      transition: border-color var(--transition-fast);
    }
    .input-sm:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-bg);
    }
    .output-info {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      margin-top: 12px;
    }
    .output-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      padding: 3px 0;
    }
    .output-row + .output-row { border-top: 1px solid var(--color-border-light); }
    .output-label { color: var(--color-text-muted); }
    .output-value { font-family: var(--font-mono); font-weight: 600; color: var(--color-text); }
    /* --- Compact buttons --- */
    .btn-compact {
      padding: 4px 10px;
      font-size: 0.75rem;
      gap: 4px;
      min-height: 28px;
    }
    .btn-compact .svg-icon svg { width: 14px; height: 14px; }

    .hidden { display: none !important; }

    /* --- Preview modal --- */
    .preview-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 9998;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl);
    }
    .preview-modal-content {
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      max-width: 90vw;
      max-height: 85vh;
      overflow: auto;
      box-shadow: var(--shadow-xl);
    }
    .preview-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-md) var(--space-lg);
      border-bottom: 1px solid var(--color-border);
    }
    .preview-modal-header h3 { font-size: 1rem; font-weight: 600; }
    .preview-modal-body {
      padding: var(--space-lg);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .preview-modal-body img {
      max-width: 100%;
      max-height: 65vh;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
    }
    .preview-modal-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-lg);
      padding: var(--space-md) var(--space-lg);
      border-top: 1px solid var(--color-border);
      font-size: 0.8125rem;
      color: var(--color-text-secondary);
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">跳转到主要内容</a>
  <div class="tool-page">
    <main class="tool-content animate-in" id="main-content" role="main">
      <div class="tool-header">
        <h1><span class="tool-icon icon-dev svg-icon" aria-hidden="true" data-icon="scissors"></span> 图片裁剪</h1>
        <p>可视化裁剪图片，支持自由拖拽框选和常用比例，实时预览裁剪区域尺寸和输出大小。</p>
      </div>

      <!-- Upload -->
      <div class="tool-panel mb-lg" id="uploadPanel">
        <div class="panel-header">
          <span class="panel-title">上传图片</span>
        </div>
        <div class="panel-body">
          <div class="image-droparea" id="uploadZone" role="button" tabindex="0" aria-label="点击或拖拽图片上传">
            <div class="image-droparea-empty" id="dropEmpty">
              <div class="image-droparea-icon svg-icon" data-icon="upload" style="justify-content:center;"></div>
              <div class="image-droparea-text">点击或拖拽图片到此处</div>
              <div class="image-droparea-hint">支持 PNG、JPG、GIF、WebP、BMP</div>
            </div>
          </div>
          <input type="file" id="fileInput" accept="image/*" hidden aria-hidden="true">
        </div>
      </div>

      <!-- Crop workspace: side-by-side layout -->
      <div class="crop-layout hidden" id="cropWorkspace">

        <!-- Left: Canvas -->
        <div class="crop-canvas-area">
          <div class="tool-panel w-full">
            <div class="panel-header">
              <span class="panel-title">图片预览</span>
              <div class="panel-actions">
                <button class="btn btn-secondary btn-compact" id="reuploadBtn">
                  <span class="svg-icon" data-icon="upload"></span> 重新上传
                </button>
              </div>
            </div>
            <div style="display:flex;justify-content:center;padding:var(--space-md);">
              <div class="crop-workspace" id="cropCanvasWrap">
                <canvas id="imgCanvas"></canvas>
                <canvas id="cropOverlay"></canvas>
              </div>
            </div>
            <div class="img-info-bar">
              <span id="origSize">--</span>
              <span id="origDims">--</span>
              <span id="origType">--</span>
            </div>
          </div>
        </div>

        <!-- Right: Controls -->
        <div class="crop-side-panel">
          <div class="tool-panel">
            <div class="panel-header">
              <span class="panel-title">裁剪设置</span>
            </div>
            <div class="panel-body">
              <div class="form-row">
                <span class="form-label">比例</span>
                <div class="ratio-btns" id="ratioBtns">
                  <button class="btn btn-secondary btn-sm active" data-ratio="free">自由</button>
                  <button class="btn btn-secondary btn-sm" data-ratio="1:1">1:1</button>
                  <button class="btn btn-secondary btn-sm" data-ratio="4:3">4:3</button>
                  <button class="btn btn-secondary btn-sm" data-ratio="16:9">16:9</button>
                  <button class="btn btn-secondary btn-sm" data-ratio="3:2">3:2</button>
                </div>
              </div>

              <div class="form-row">
                <span class="form-label">X,Y</span>
                <input type="number" class="input-sm" id="cropX" placeholder="X" min="0">
                <span style="color:var(--color-text-muted);font-size:0.625rem;">,</span>
                <input type="number" class="input-sm" id="cropY" placeholder="Y" min="0">
              </div>
              <div class="form-row">
                <span class="form-label">W×H</span>
                <input type="number" class="input-sm" id="cropW" placeholder="宽" min="1">
                <span style="color:var(--color-text-muted);font-size:0.625rem;">×</span>
                <input type="number" class="input-sm" id="cropH" placeholder="高" min="1">
                <span style="font-size:0.625rem;color:var(--color-text-muted);">px</span>
              </div>

              <div class="output-info">
                <div class="output-row">
                  <span class="output-label">裁剪尺寸</span>
                  <span class="output-value" id="cropDims">-</span>
                </div>
                <div class="output-row">
                  <span class="output-label">输出大小</span>
                  <span class="output-value" id="cropSize">-</span>
                </div>
              </div>

              <div class="mt-md" style="display:flex;gap:6px;flex-wrap:wrap;">
                <button class="btn btn-primary btn-compact" id="cropPreviewBtn">
                  <span class="svg-icon" data-icon="scan"></span> 预览
                </button>
                <button class="btn btn-secondary btn-compact" id="cropDownloadBtn">
                  <span class="svg-icon" data-icon="download"></span> 下载
                </button>
                <button class="btn btn-ghost btn-compact" id="cropResetBtn">
                  <span class="svg-icon" data-icon="swap"></span> 重置
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/icons.js"></script>
  <script src="../js/common.js"></script>
  <script>
    initToolPage('image-crop');

    // --- State ---
    let origImg = null;
    let origFile = null;
    let origBlobUrl = null;
    let canvasScale = 1;
    let dpr = 1;
    let cropRect = { x: 0, y: 0, w: 0, h: 0 };
    let aspectRatio = null;
    let isDragging = false;
    let dragMode = null;
    let dragStart = { x: 0, y: 0 };
    let cropStart = { x: 0, y: 0, w: 0, h: 0 };

    // --- DOM ---
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const uploadPanel = document.getElementById('uploadPanel');
    const cropWorkspace = document.getElementById('cropWorkspace');
    const imgCanvas = document.getElementById('imgCanvas');
    const cropCanvas = document.getElementById('cropOverlay');
    const ctx = imgCanvas.getContext('2d');
    const cropCtx = cropCanvas.getContext('2d');

    // --- Upload ---
    uploadZone.addEventListener('click', () => fileInput.click());
    uploadZone.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); } });
    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });
    document.getElementById('reuploadBtn').addEventListener('click', () => fileInput.click());

    function loadFile(file) {
      if (!file.type.startsWith('image/')) {
        showToast('请选择图片文件', 'error');
        return;
      }
      origFile = file;
      if (origBlobUrl) URL.revokeObjectURL(origBlobUrl);
      origBlobUrl = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        origImg = img;
        initCanvas();
        showPanels();
        updateImgInfo();
        initCrop();
        updateCropInfo();
        detectAnimated(file).then(animated => {
          if (animated) showToast('检测到动图，裁剪后将变为静态图片', 'info');
        });
      };
      img.src = origBlobUrl;
    }

    function showPanels() {
      uploadPanel.classList.add('hidden');
      cropWorkspace.classList.remove('hidden');
    }

    function updateImgInfo() {
      document.getElementById('origSize').textContent = formatSize(origFile.size);
      document.getElementById('origDims').textContent = origImg.naturalWidth + ' × ' + origImg.naturalHeight + ' px';
      document.getElementById('origType').textContent = origFile.type.split('/')[1].toUpperCase();
    }

    // --- Canvas ---
    function initCanvas() {
      const MAX_W = 520;
      const nw = origImg.naturalWidth;
      const nh = origImg.naturalHeight;
      canvasScale = Math.min(1, MAX_W / nw);
      const dw = Math.round(nw * canvasScale);
      const dh = Math.round(nh * canvasScale);
      dpr = window.devicePixelRatio || 1;

      imgCanvas.width = dw * dpr;
      imgCanvas.height = dh * dpr;
      imgCanvas.style.width = dw + 'px';
      imgCanvas.style.height = dh + 'px';
      ctx.scale(dpr, dpr);
      ctx.drawImage(origImg, 0, 0, dw, dh);

      cropCanvas.width = dw * dpr;
      cropCanvas.height = dh * dpr;
      cropCanvas.style.width = dw + 'px';
      cropCanvas.style.height = dh + 'px';
      cropCtx.scale(dpr, dpr);
    }

    // --- Crop ---
    function initCrop() {
      cropRect = { x: 0, y: 0, w: origImg.naturalWidth, h: origImg.naturalHeight };
      updateCropInputs();
      drawCropOverlay();
    }

    function drawCropOverlay() {
      const cw = parseFloat(cropCanvas.style.width) || cropCanvas.width;
      const ch = parseFloat(cropCanvas.style.height) || cropCanvas.height;
      cropCtx.clearRect(0, 0, cw, ch);

      if (cropRect.w <= 0 || cropRect.h <= 0) return;

      // Dim overlay
      cropCtx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      cropCtx.fillRect(0, 0, cw, ch);

      // Clear crop area
      const cx = cropRect.x * canvasScale;
      const cy = cropRect.y * canvasScale;
      const cwid = cropRect.w * canvasScale;
      const chei = cropRect.h * canvasScale;
      cropCtx.clearRect(cx, cy, cwid, chei);

      // Border
      cropCtx.strokeStyle = '#fff';
      cropCtx.lineWidth = 2;
      cropCtx.strokeRect(cx, cy, cwid, chei);

      // Rule of thirds grid
      cropCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      cropCtx.lineWidth = 1;
      for (let i = 1; i <= 2; i++) {
        cropCtx.beginPath();
        cropCtx.moveTo(cx + cwid * i / 3, cy);
        cropCtx.lineTo(cx + cwid * i / 3, cy + chei);
        cropCtx.stroke();
        cropCtx.beginPath();
        cropCtx.moveTo(cx, cy + chei * i / 3);
        cropCtx.lineTo(cx + cwid, cy + chei * i / 3);
        cropCtx.stroke();
      }

      // Handles
      const hs = 12;
      const halfHs = hs / 2;
      const handles = getHandles(cx, cy, cwid, chei);
      cropCtx.fillStyle = '#fff';
      cropCtx.strokeStyle = '#2563EB';
      cropCtx.lineWidth = 2;
      for (const pos in handles) {
        let [hx, hy] = handles[pos];
        hx = Math.max(halfHs, Math.min(cw - halfHs, hx));
        hy = Math.max(halfHs, Math.min(ch - halfHs, hy));
        cropCtx.fillRect(hx - halfHs, hy - halfHs, hs, hs);
        cropCtx.strokeRect(hx - halfHs, hy - halfHs, hs, hs);
      }
    }

    function getHandles(cx, cy, cw, ch) {
      return {
        nw: [cx, cy],
        n:  [cx + cw / 2, cy],
        ne: [cx + cw, cy],
        w:  [cx, cy + ch / 2],
        e:  [cx + cw, cy + ch / 2],
        sw: [cx, cy + ch],
        s:  [cx + cw / 2, cy + ch],
        se: [cx + cw, cy + ch],
      };
    }

    function getHandleAt(mx, my) {
      const cx = cropRect.x * canvasScale;
      const cy = cropRect.y * canvasScale;
      const cw = cropRect.w * canvasScale;
      const ch = cropRect.h * canvasScale;
      const handles = getHandles(cx, cy, cw, ch);
      const threshold = 14;
      for (const pos in handles) {
        const [hx, hy] = handles[pos];
        if (Math.abs(mx - hx) <= threshold && Math.abs(my - hy) <= threshold) return pos;
      }
      if (mx >= cx && mx <= cx + cw && my >= cy && my <= cy + ch) return 'move';
      return null;
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function getMousePos(e) {
      const rect = cropCanvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    // --- Mouse events ---
    cropCanvas.addEventListener('mousedown', (e) => {
      const { x: mx, y: my } = getMousePos(e);
      const handle = getHandleAt(mx, my);
      isDragging = true;
      dragStart = { x: mx, y: my };
      if (handle) {
        dragMode = handle;
        cropStart = { ...cropRect };
      } else {
        dragMode = 'draw';
        const nx = mx / canvasScale;
        const ny = my / canvasScale;
        cropRect = { x: nx, y: ny, w: 0, h: 0 };
        cropStart = { x: nx, y: ny, w: 0, h: 0 };
      }
      e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) {
        if (!cropCanvas) return;
        const { x: mx, y: my } = getMousePos(e);
        const handle = getHandleAt(mx, my);
        const cursorMap = {
          move: 'move', nw: 'nw-resize', ne: 'ne-resize', sw: 'sw-resize', se: 'se-resize',
          n: 'n-resize', s: 's-resize', w: 'w-resize', e: 'e-resize'
        };
        cropCanvas.style.cursor = handle ? (cursorMap[handle] || 'crosshair') : 'crosshair';
        return;
      }

      const { x: mx, y: my } = getMousePos(e);
      const dx = (mx - dragStart.x) / canvasScale;
      const dy = (my - dragStart.y) / canvasScale;
      const maxW = origImg.naturalWidth;
      const maxH = origImg.naturalHeight;

      if (dragMode === 'move') {
        cropRect.x = clamp(cropStart.x + dx, 0, maxW - cropStart.w);
        cropRect.y = clamp(cropStart.y + dy, 0, maxH - cropStart.h);
      } else if (dragMode === 'draw') {
        let nx = cropStart.x, ny = cropStart.y;
        let nw = dx, nh = dy;
        if (nw < 0) { nx += nw; nw = -nw; }
        if (nh < 0) { ny += nh; nh = -nh; }
        nx = clamp(nx, 0, maxW);
        ny = clamp(ny, 0, maxH);
        nw = clamp(nw, 1, maxW - nx);
        nh = clamp(nh, 1, maxH - ny);
        if (aspectRatio) {
          nh = nw / aspectRatio;
          if (ny + nh > maxH) { nh = maxH - ny; nw = nh * aspectRatio; }
        }
        cropRect = { x: nx, y: ny, w: nw, h: nh };
      } else {
        let nx = cropStart.x, ny = cropStart.y, nw = cropStart.w, nh = cropStart.h;

        if (dragMode.includes('w')) { nx = cropStart.x + dx; nw = cropStart.w - dx; }
        if (dragMode.includes('e')) { nw = cropStart.w + dx; }
        if (dragMode.includes('n')) { ny = cropStart.y + dy; nh = cropStart.h - dy; }
        if (dragMode.includes('s')) { nh = cropStart.h + dy; }

        if (nw < 20) { if (dragMode.includes('w')) nx = cropStart.x + cropStart.w - 20; nw = 20; }
        if (nh < 20) { if (dragMode.includes('n')) ny = cropStart.y + cropStart.h - 20; nh = 20; }
        nx = clamp(nx, 0, maxW - 20);
        ny = clamp(ny, 0, maxH - 20);
        nw = clamp(nw, 20, maxW - nx);
        nh = clamp(nh, 20, maxH - ny);

        if (aspectRatio) {
          if (dragMode.includes('w') || dragMode.includes('e')) {
            nh = nw / aspectRatio;
            if (ny + nh > maxH) { nh = maxH - ny; nw = nh * aspectRatio; }
          } else {
            nw = nh * aspectRatio;
            if (nx + nw > maxW) { nw = maxW - nx; nh = nw / aspectRatio; }
          }
        }

        cropRect = { x: nx, y: ny, w: nw, h: nh };
      }

      updateCropInputs();
      drawCropOverlay();
      updateCropInfo();
    });

    window.addEventListener('mouseup', () => { isDragging = false; dragMode = null; });

    // --- Crop inputs ---
    ['cropX', 'cropY', 'cropW', 'cropH'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        cropRect.x = parseInt(document.getElementById('cropX').value) || 0;
        cropRect.y = parseInt(document.getElementById('cropY').value) || 0;
        cropRect.w = parseInt(document.getElementById('cropW').value) || 1;
        cropRect.h = parseInt(document.getElementById('cropH').value) || 1;
        const maxW = origImg ? origImg.naturalWidth : 0;
        const maxH = origImg ? origImg.naturalHeight : 0;
        cropRect.x = clamp(cropRect.x, 0, maxW - 1);
        cropRect.y = clamp(cropRect.y, 0, maxH - 1);
        cropRect.w = clamp(cropRect.w, 1, maxW - cropRect.x);
        cropRect.h = clamp(cropRect.h, 1, maxH - cropRect.y);
        updateCropInputs();
        drawCropOverlay();
        updateCropInfo();
      });
    });

    function updateCropInputs() {
      document.getElementById('cropX').value = Math.round(cropRect.x);
      document.getElementById('cropY').value = Math.round(cropRect.y);
      document.getElementById('cropW').value = Math.round(cropRect.w);
      document.getElementById('cropH').value = Math.round(cropRect.h);
    }

    // --- Ratio buttons ---
    document.getElementById('ratioBtns').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-ratio]');
      if (!btn) return;
      document.querySelectorAll('#ratioBtns .btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const r = btn.dataset.ratio;
      if (r === 'free') {
        aspectRatio = null;
      } else {
        const [w, h] = r.split(':').map(Number);
        aspectRatio = w / h;
        const cx = cropRect.x + cropRect.w / 2;
        const cy = cropRect.y + cropRect.h / 2;
        let nw = cropRect.w;
        let nh = nw / aspectRatio;
        if (nh > origImg.naturalHeight) { nh = origImg.naturalHeight; nw = nh * aspectRatio; }
        if (nw > origImg.naturalWidth) { nw = origImg.naturalWidth; nh = nw / aspectRatio; }
        cropRect.x = clamp(cx - nw / 2, 0, origImg.naturalWidth - nw);
        cropRect.y = clamp(cy - nh / 2, 0, origImg.naturalHeight - nh);
        cropRect.w = nw;
        cropRect.h = nh;
        updateCropInputs();
        drawCropOverlay();
        updateCropInfo();
      }
    });

    // --- Crop output info ---
    function updateCropInfo() {
      const w = Math.round(cropRect.w);
      const h = Math.round(cropRect.h);
      document.getElementById('cropDims').textContent = w + ' × ' + h + ' px';
      estimateCropSize().then(size => {
        document.getElementById('cropSize').textContent = formatSize(size);
      });
    }

    function estimateCropSize() {
      return new Promise(resolve => {
        const c = document.createElement('canvas');
        c.width = Math.round(cropRect.w);
        c.height = Math.round(cropRect.h);
        const cx = c.getContext('2d');
        cx.drawImage(origImg, cropRect.x, cropRect.y, cropRect.w, cropRect.h, 0, 0, c.width, c.height);
        c.toBlob(blob => resolve(blob ? blob.size : 0), origFile.type || 'image/png');
      });
    }

    // --- Reset ---
    document.getElementById('cropResetBtn').addEventListener('click', () => {
      if (!origImg) return;
      aspectRatio = null;
      document.querySelectorAll('#ratioBtns .btn').forEach(b => b.classList.remove('active'));
      document.querySelector('#ratioBtns [data-ratio="free"]').classList.add('active');
      initCrop();
      updateCropInfo();
      showToast('已重置裁剪区域');
    });

    // --- Preview ---
    document.getElementById('cropPreviewBtn').addEventListener('click', () => {
      if (!origImg) return;
      buildCropBlob().then(({ blob, w, h }) => {
        if (!blob) return;
        showPreviewModal('裁剪预览', URL.createObjectURL(blob), blob.size, w + ' × ' + h + ' px');
      });
    });

    // --- Download ---
    document.getElementById('cropDownloadBtn').addEventListener('click', () => {
      if (!origImg) return;
      buildCropBlob().then(({ blob }) => {
        if (!blob) return;
        downloadBlob(blob, 'cropped-' + origFile.name);
      });
    });

    function buildCropBlob() {
      return new Promise(resolve => {
        const w = Math.round(cropRect.w);
        const h = Math.round(cropRect.h);
        const c = document.createElement('canvas');
        c.width = w;
        c.height = h;
        const cx = c.getContext('2d');
        cx.drawImage(origImg, cropRect.x, cropRect.y, cropRect.w, cropRect.h, 0, 0, w, h);
        c.toBlob(blob => resolve({ blob, w, h }), origFile.type || 'image/png');
      });
    }

    // --- Preview Modal ---
    function showPreviewModal(title, url, size, dims) {
      const existing = document.querySelector('.preview-modal');
      if (existing) existing.remove();
      const modal = document.createElement('div');
      modal.className = 'preview-modal';
      modal.innerHTML = '<div class="preview-modal-content">' +
        '<div class="preview-modal-header"><h3>' + title + '</h3>' +
        '<button class="btn btn-ghost btn-compact" id="closePreview">' +
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
        '</button></div>' +
        '<div class="preview-modal-body"><img src="' + url + '" alt="' + title + '"></div>' +
        '<div class="preview-modal-footer"><span>尺寸: ' + dims + '</span><span>大小: ' + formatSize(size) + '</span></div>' +
        '</div>';
      document.body.appendChild(modal);
      document.getElementById('closePreview').addEventListener('click', () => { modal.remove(); URL.revokeObjectURL(url); });
      modal.addEventListener('click', (e) => { if (e.target === modal) { modal.remove(); URL.revokeObjectURL(url); } });
    }

    // --- Helpers ---
    function detectAnimated(file) {
      return file.arrayBuffer().then(buf => {
        const bytes = new Uint8Array(buf);
        if (bytes[0] === 0x47 && bytes[1] === 0x49 && bytes[2] === 0x46) {
          return bytes[3] === 0x39 && bytes[4] === 0x61;
        }
        if (bytes[0] === 0x52 && bytes[1] === 0x49 && bytes[2] === 0x46 && bytes[3] === 0x46 &&
            bytes[8] === 0x57 && bytes[9] === 0x45 && bytes[10] === 0x42 && bytes[11] === 0x50) {
          const searchLen = Math.min(bytes.length, 1024);
          for (let i = 12; i < searchLen - 3; i++) {
            if (bytes[i] === 0x41 && bytes[i+1] === 0x4E && bytes[i+2] === 0x49 && bytes[i+3] === 0x4D) {
              return true;
            }
          }
        }
        return false;
      }).catch(() => false);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function downloadBlob(blob, filename) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }
  </script>
</body>
</html>
