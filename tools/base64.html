<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
</head>
<body>
  <a href="#main-content" class="skip-link">跳转到主要内容</a>
  <div class="tool-page">
    <main class="tool-content animate-in" id="main-content" role="main">
      <div class="tool-header">
        <h1><span class="tool-icon icon-encode svg-icon" aria-hidden="true" data-icon="lock"></span> Base64 编解码</h1>
        <p>将文本与 Base64 编码互相转换，完美支持 UTF-8 中文字符。</p>
      </div>

      <div class="tool-panel mb-lg">
        <div class="panel-body flex-row">
          <div class="btn-group" role="group" aria-label="编码模式">
            <button class="btn btn-secondary active" id="modeEncode" aria-pressed="true">编码</button>
            <button class="btn btn-secondary" id="modeDecode" aria-pressed="false">解码</button>
          </div>
          <button class="swap-btn" id="swapBtn" title="交换输入输出" aria-label="交换输入输出">
            <span class="svg-icon" data-icon="swap"></span>
          </button>
        </div>
      </div>

      <div class="tool-panel">
        <div class="tool-io" style="padding: var(--space-lg);">
          <div class="io-box">
            <label class="io-label" for="inputText" id="inputLabel">输入文本</label>
            <textarea class="textarea-field" id="inputText" placeholder="请输入要编码的文本..." aria-describedby="inputLabel"></textarea>
          </div>
          <div class="io-box">
            <label class="io-label" for="outputText" id="outputLabel">Base64 结果</label>
            <textarea class="textarea-field" id="outputText" placeholder="Base64 编码结果将显示在这里..." readonly aria-describedby="outputLabel"></textarea>
          </div>
        </div>
        <div class="panel-actions-row" style="padding: 0 var(--space-lg) var(--space-lg);">
          <button class="btn btn-primary" onclick="convert()">转换</button>
          <button class="btn btn-secondary" onclick="copyOutputText('outputText')">
            <span class="svg-icon" data-icon="copy"></span> 复制结果
          </button>
          <button class="btn btn-ghost" onclick="clearTextareas('inputText', 'outputText'); updateLen();">清空</button>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-card">
          <div class="info-card-label">输入长度</div>
          <div class="info-card-value" id="inputLen">0</div>
        </div>
        <div class="info-card">
          <div class="info-card-label">输出长度</div>
          <div class="info-card-value" id="outputLen">0</div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/icons.js"></script>
  <script src="../js/common.js"></script>
  <script>
    initToolPage('base64');

    let mode = 'encode';

    const setMode = setupModeToggle('modeEncode', 'modeDecode', ['encode', 'decode'], (m) => {
      mode = m;
      document.getElementById('inputLabel').textContent = m === 'encode' ? '输入文本' : '输入 Base64';
      document.getElementById('outputLabel').textContent = m === 'encode' ? 'Base64 结果' : '解码结果';
      document.getElementById('inputText').placeholder = m === 'encode' ? '请输入要编码的文本...' : '请输入 Base64 编码...';
      convert();
    });

    document.getElementById('swapBtn').addEventListener('click', () => {
      swapTextareas('inputText', 'outputText', () => setMode(mode === 'encode' ? 'decode' : 'encode'));
    });

    function convert() {
      const input = document.getElementById('inputText').value;
      const output = document.getElementById('outputText');
      if (!input) { output.value = ''; updateLen(); return; }
      try {
        if (mode === 'encode') {
          const bytes = new TextEncoder().encode(input);
          output.value = btoa(Array.from(bytes, b => String.fromCharCode(b)).join(''));
        } else {
          const binary = atob(input.trim());
          const bytes = new Uint8Array([...binary].map(c => c.charCodeAt(0)));
          output.value = new TextDecoder().decode(bytes);
        }
      } catch (e) {
        output.value = '';
        showToast('转换失败：无效的输入', 'error');
      }
      updateLen();
    }

    function updateLen() {
      document.getElementById('inputLen').textContent = document.getElementById('inputText').value.length;
      document.getElementById('outputLen').textContent = document.getElementById('outputText').value.length;
    }

    document.getElementById('inputText').addEventListener('input', debounce(convert, 200));
    convert();
  </script>
</body>
</html>
