<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
</head>
<body>
  <a href="#main-content" class="skip-link">跳转到主要内容</a>
  <div class="tool-page">
    <main class="tool-content animate-in" id="main-content" role="main">
      <div class="tool-header">
        <h1><span class="tool-icon icon-hash svg-icon" aria-hidden="true" data-icon="hash"></span> 哈希生成</h1>
        <p>输入文本，一键生成 MD5、SHA-1、SHA-256、SHA-512 哈希值。</p>
      </div>

      <div class="tool-panel mb-lg">
        <div class="panel-header">
          <span class="panel-title">输入文本</span>
          <button class="btn btn-ghost btn-sm" onclick="clearAll()">清空</button>
        </div>
        <div class="panel-body">
          <label class="io-label" for="hashInput">待计算文本</label>
          <textarea class="textarea-field min-h-sm" id="hashInput" placeholder="输入要计算哈希值的文本..."></textarea>
        </div>
      </div>

      <div class="tool-panel">
        <div class="panel-header">
          <span class="panel-title">哈希结果</span>
          <button class="btn btn-secondary btn-sm" onclick="copyAll()">
            <span class="svg-icon" data-icon="copy"></span> 复制全部
          </button>
        </div>
        <div class="panel-body">
          <div id="hashResults">
            <div class="empty-state">
              <div class="empty-state-icon svg-icon" data-icon="lock" style="justify-content:center;"></div>
              <div class="empty-state-text">输入文本后将自动计算哈希值</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/icons.js"></script>
  <script src="../js/md5.js"></script>
  <script src="../js/common.js"></script>
  <script>
    initToolPage('hash');

    const algorithms = ['SHA-1', 'SHA-256', 'SHA-384', 'SHA-512'];
    let lastResults = [];

    async function computeHashes(text) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const results = [];
      for (const algo of algorithms) {
        const hashBuffer = await crypto.subtle.digest(algo, data);
        const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        results.push({ algo, hash: hashHex });
      }
      const bytes = new TextEncoder().encode(text);
      const binary = Array.from(bytes, b => String.fromCharCode(b)).join('');
      results.unshift({ algo: 'MD5', hash: md5(binary) });
      return results;
    }

    async function generateHashes() {
      const text = document.getElementById('hashInput').value;
      const container = document.getElementById('hashResults');
      if (!text) {
        container.innerHTML = `<div class="empty-state"><div class="empty-state-icon svg-icon" style="justify-content:center;" data-icon="lock"></div><div class="empty-state-text">输入文本后将自动计算哈希值</div></div>`;
        container.querySelectorAll('[data-icon]').forEach(el => { el.innerHTML = getIcon(el.dataset.icon); });
        lastResults = [];
        return;
      }
      const results = await computeHashes(text);
      lastResults = results;
      container.innerHTML = results.map((r, i) => `
        <div style="margin-bottom:var(--space-md);padding:var(--space-md);background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-md);display:flex;align-items:center;gap:var(--space-md);flex-wrap:wrap;">
          <div style="min-width:70px;font-weight:600;font-size:0.8125rem;color:var(--color-text-secondary);">${r.algo}</div>
          <div style="flex:1;font-family:var(--font-mono);font-size:0.8125rem;word-break:break-all;color:var(--color-text);">${escapeHtml(r.hash)}</div>
          <button class="btn btn-ghost btn-sm" data-copy-hash="${i}">
            <span class="svg-icon">${getIcon('copy')}</span> 复制
          </button>
        </div>
      `).join('');
    }

    // Event delegation for copy buttons
    document.getElementById('hashResults').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-copy-hash]');
      if (btn && lastResults[+btn.dataset.copyHash]) {
        copyText(lastResults[+btn.dataset.copyHash].hash);
      }
    });

    function copyAll() {
      const text = document.getElementById('hashInput').value;
      if (!text) return;
      computeHashes(text).then(results => {
        copyText(results.map(r => `${r.algo}: ${r.hash}`).join('\n'));
      });
    }

    function clearAll() {
      document.getElementById('hashInput').value = '';
      generateHashes();
    }

    document.getElementById('hashInput').addEventListener('input', debounce(generateHashes, 300));
  </script>
</body>
</html>
