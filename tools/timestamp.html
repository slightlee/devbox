<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
</head>
<body>
  <a href="#main-content" class="skip-link">跳转到主要内容</a>
  <div class="tool-page">
    <main class="tool-content animate-in" id="main-content" role="main">
      <div class="tool-header">
        <h1><span class="tool-icon icon-time svg-icon" aria-hidden="true" data-icon="clock"></span> 时间戳转换</h1>
        <p>Unix 时间戳与人类可读日期时间互相转换。</p>
      </div>

      <div class="tool-panel mb-lg">
        <div class="panel-header">
          <span class="panel-title">当前时间</span>
          <button class="btn btn-ghost btn-sm" onclick="copyText(String(Math.floor(Date.now()/1000)))">
            <span class="svg-icon" data-icon="copy"></span> 复制时间戳
          </button>
        </div>
        <div class="panel-body">
          <div class="info-grid" style="margin:0;">
            <div class="info-card">
              <div class="info-card-label">秒级时间戳</div>
              <div class="info-card-value" id="nowSec">-</div>
            </div>
            <div class="info-card">
              <div class="info-card-label">毫秒时间戳</div>
              <div class="info-card-value" id="nowMs">-</div>
            </div>
            <div class="info-card">
              <div class="info-card-label">当前时间</div>
              <div class="info-card-value text-sm" id="nowStr">-</div>
            </div>
          </div>
        </div>
      </div>

      <div class="tool-panel mb-lg">
        <div class="panel-header">
          <span class="panel-title">时间戳 → 日期</span>
        </div>
        <div class="panel-body">
          <div class="flex-row-end">
            <div style="flex:1;min-width:200px;">
              <label class="io-label" for="tsInput">输入时间戳</label>
              <input type="text" class="input-field mono" id="tsInput" placeholder="例如：1700000000">
            </div>
            <div>
              <button class="btn btn-primary" onclick="tsToDate()">转换</button>
            </div>
          </div>
          <div id="tsResult" class="mt-md" hidden>
            <div class="info-grid" style="margin:0;">
              <div class="info-card">
                <div class="info-card-label">本地时间</div>
                <div class="info-card-value text-sm" id="tsLocal">-</div>
              </div>
              <div class="info-card">
                <div class="info-card-label">UTC 时间</div>
                <div class="info-card-value text-sm" id="tsUtc">-</div>
              </div>
              <div class="info-card">
                <div class="info-card-label">ISO 8601</div>
                <div class="info-card-value" id="tsIso" style="font-size:0.75rem;">-</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="tool-panel">
        <div class="panel-header">
          <span class="panel-title">日期 → 时间戳</span>
        </div>
        <div class="panel-body">
          <div class="flex-row-end">
            <div style="flex:1;min-width:200px;">
              <label class="io-label" for="dateInput">选择日期时间</label>
              <input type="datetime-local" class="input-field mono" id="dateInput">
            </div>
            <div>
              <button class="btn btn-primary" onclick="dateToTs()">转换</button>
            </div>
          </div>
          <div id="dateResult" class="mt-md" hidden>
            <div class="info-grid" style="margin:0;">
              <div class="info-card">
                <div class="info-card-label">秒级时间戳</div>
                <div class="info-card-value" id="dateSec">-</div>
              </div>
              <div class="info-card">
                <div class="info-card-label">毫秒时间戳</div>
                <div class="info-card-value" id="dateMs">-</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/icons.js"></script>
  <script src="../js/common.js"></script>
  <script>
    initToolPage('timestamp');

    function updateNow() {
      const now = new Date();
      const sec = Math.floor(now.getTime() / 1000);
      document.getElementById('nowSec').textContent = sec;
      document.getElementById('nowMs').textContent = now.getTime();
      document.getElementById('nowStr').textContent = now.toLocaleString('zh-CN');
    }
    updateNow();
    setInterval(updateNow, 1000);

    document.getElementById('dateInput').value = new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16);

    function tsToDate() {
      let ts = document.getElementById('tsInput').value.trim();
      if (!ts) { showToast('请输入时间戳', 'info'); return; }
      ts = Number(ts);
      if (ts < 1e12) ts = ts * 1000;
      const d = new Date(ts);
      if (isNaN(d.getTime())) { showToast('无效的时间戳', 'error'); return; }
      document.getElementById('tsLocal').textContent = d.toLocaleString('zh-CN');
      document.getElementById('tsUtc').textContent = d.toUTCString();
      document.getElementById('tsIso').textContent = d.toISOString();
      document.getElementById('tsResult').hidden = false;
    }

    function dateToTs() {
      const v = document.getElementById('dateInput').value;
      if (!v) { showToast('请选择日期时间', 'info'); return; }
      const d = new Date(v);
      document.getElementById('dateSec').textContent = Math.floor(d.getTime() / 1000);
      document.getElementById('dateMs').textContent = d.getTime();
      document.getElementById('dateResult').hidden = false;
    }
  </script>
</body>
</html>
